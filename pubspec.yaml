     name: health_nest
     description: A new Flutter project.
     publish_to: 'none'
     version: 1.0.0+1

     environment:
       sdk: '>=3.0.0 <4.0.0'

     dependencies:
       flutter:
         sdk: flutter
       firebase_core: ^4.0.0
       firebase_auth: ^6.0.1
       cloud_firestore: ^6.0.0
       google_sign_in: ^7.1.1
       provider: ^6.1.2
       cupertino_icons: ^1.0.8
       pedometer: ^4.1.1
       font_awesome_flutter: ^10.10.0
       intl: ^0.20.2
       url_launcher: ^6.3.2

     dev_dependencies:
       flutter_test:
         sdk: flutter
       flutter_lints: ^6.0.0

     flutter:
       uses-material-design: true
       assets:
         - assets/images/
         - assets/documents/
         - assets/fonts/
       fonts:
         - family: CustomFont
           fonts:
             - asset: assets/fonts/CustomFont-Regular.ttf
               weight: 400
             - asset: assets/fonts/CustomFont-Bold.ttf
               weight: 700
